version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pixel-race-postgres-prod
    environment:
      POSTGRES_DB: pixel_race_prod
      POSTGRES_USER: pixel_race_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixel_race_user -d pixel_race_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - pixel-race-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: production
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: pixel-race-backend-prod
    env_file:
      - ./backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://pixel_race_user:${POSTGRES_PASSWORD}@postgres:5432/pixel_race_prod
      SOCKET_SERVER_URL: http://socket-server:3000
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    volumes:
      - ./common:/app/common:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - pixel-race-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  socket-server:
    build:
      context: .
      dockerfile: ./socket-server/Dockerfile
      target: production
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: pixel-race-socket-prod
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:8000
      CORS_ORIGIN: ${FRONTEND_URL}
      PROGRESS_UPDATE_INTERVAL: 100
      RACE_CLEANUP_DELAY: 60000
    volumes:
      - ./common:/app/common:ro
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - pixel-race-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      target: production
      args:
        - BUILDKIT_INLINE_CACHE=1
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
    container_name: pixel-race-frontend-prod
    env_file:
      - ./frontend/.env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    volumes:
      - ./common:/app/common:ro
    ports:
      - "3001:3001"
    depends_on:
      - backend
      - socket-server
    restart: always
    networks:
      - pixel-race-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  pixel-race-network:
    driver: bridge

volumes:
  postgres_data_prod:
    driver: local

# ===================================
# Nginx Configuration for Pixel Race
# ===================================
# Production deployment with subdomain structure:
# - Frontend: pixelrace.online
# - Backend API: api.pixelrace.online
# - Socket Server: socket.pixelrace.online

# Rate limiting zone (shared across all servers)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ===================================
# Frontend - pixelrace.online (HTTPS)
# ===================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pixelrace.online www.pixelrace.online;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/pixelrace.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelrace.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json;
}

# Frontend HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name pixelrace.online www.pixelrace.online;

    return 301 https://$host$request_uri;
}

# ===================================
# Backend API - api.pixelrace.online (HTTPS)
# ===================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.pixelrace.online;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/pixelrace.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelrace.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix 307 redirects: Rewrite HTTP redirects to HTTPS
        proxy_redirect http:// https://;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check (no rate limiting)
    location /health {
        proxy_pass http://localhost:8000/health;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Backend API HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.pixelrace.online;

    return 301 https://$host$request_uri;
}

# ===================================
# Socket Server - socket.pixelrace.online (HTTPS)
# ===================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name socket.pixelrace.online;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/pixelrace.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelrace.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:3000/health;
    }
}

# Socket Server HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name socket.pixelrace.online;

    return 301 https://$host$request_uri;
}
